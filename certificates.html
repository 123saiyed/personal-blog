<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Certifications and achievements of Ajamali Saiyad, Assistant Professor at LJ University." />
  <title>Certificates — Ajamali Saiyad</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
</head>
<body class="holo">

  <!-- ===== NAVBAR ===== -->
  <nav class="navbar">
    <div class="container nav-inner">
      <a href="index.html" class="nav-logo">Ajamali Saiyad</a>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="certificates.html" class="active">Certificates</a></li>
      </ul>
      <button class="nav-toggle" aria-label="Toggle menu">&#9776;</button>
    </div>
  </nav>

  <!-- Full-page 3D particle background -->
  <canvas id="vfx-canvas" aria-hidden="true"></canvas>

  <!-- Floating gradient blobs (decoration) -->
  <div class="vfx-blob vfx-blob-1" aria-hidden="true"></div>
  <div class="vfx-blob vfx-blob-2" aria-hidden="true"></div>
  <div class="vfx-blob vfx-blob-3" aria-hidden="true"></div>

  <!-- ===== PAGE HEADER ===== -->
  <section class="page-header">
    <div class="container">
      <h1>Certifications</h1>
      <p>A collection of my professional certifications and academic achievements.</p>
    </div>
  </section>

  <!-- ===== GALLERY ===== -->
  <section class="section">
    <div class="container">
      <div class="certs-grid" id="certs-grid">
        <div class="cert-card skeleton"></div>
        <div class="cert-card skeleton"></div>
        <div class="cert-card skeleton"></div>
        <div class="cert-card skeleton"></div>
        <div class="cert-card skeleton"></div>
        <div class="cert-card skeleton"></div>
      </div>
      <div class="empty-state hidden" id="certs-empty">
        <div class="empty-icon">&#127942;</div>
        <p>No certificates added yet.</p>
      </div>
    </div>
  </section>

  <!-- ===== LIGHTBOX ===== -->
  <div class="lightbox hidden" id="lightbox" role="dialog" aria-modal="true" aria-label="Certificate viewer">
    <button class="lightbox-close" id="lightbox-close" aria-label="Close">&times;</button>
    <div class="lightbox-content">
      <img id="lightbox-img" src="" alt="Certificate" />
      <div class="lightbox-info">
        <h3 id="lightbox-title"></h3>
      </div>
    </div>
  </div>
  <div class="lightbox-overlay hidden" id="lightbox-overlay"></div>

  <!-- ===== FOOTER ===== -->
  <footer class="footer">
    <div class="container footer-inner">
      <p>&copy; <span id="footer-year"></span> Ajamali Saiyad. All rights reserved.</p>
      <ul class="footer-links">
        <li><a href="certificates.html">Certificates</a></li>
      </ul>
    </div>
  </footer>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/app.js"></script>
  <script src="js/vfx.js" defer></script>
  <script>document.getElementById('footer-year').textContent = new Date().getFullYear();</script>
</body>
</html>
