<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Blog post by Ajamali Saiyad" />
  <title>Post — Ajamali Saiyad</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- ===== NAVBAR ===== -->
  <nav class="navbar">
    <div class="container nav-inner">
      <a href="index.html" class="nav-logo">Ajamali Saiyad</a>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="blog.html" class="active">Blog</a></li>
        <li><a href="certificates.html">Certificates</a></li>
      </ul>
      <button class="nav-toggle" aria-label="Toggle menu">&#9776;</button>
    </div>
  </nav>

  <!-- ===== POST CONTENT ===== -->
  <main class="post-page">
    <div class="container">

      <!-- Loading state -->
      <div id="post-loading" class="post-loading">
        <div class="post-skeleton-title skeleton"></div>
        <div class="post-skeleton-meta skeleton"></div>
        <div class="post-skeleton-body skeleton"></div>
      </div>

      <!-- Error state -->
      <div id="post-error" class="empty-state hidden">
        <div class="empty-icon">&#128196;</div>
        <p>Post not found or has been removed.</p>
        <a href="blog.html" class="btn-primary" style="margin-top:20px;display:inline-flex">← Back to Blog</a>
      </div>

      <!-- Post article -->
      <article id="post-article" class="post-article hidden">
        <a href="blog.html" class="post-back-link">&#8592; Back to Blog</a>

        <header class="post-article-header">
          <span id="post-cat-badge" class="badge"></span>
          <h1 id="post-article-title"></h1>
          <div class="post-article-meta">
            <span id="post-article-date"></span>
            <span class="post-article-author">Ajamali Saiyad</span>
          </div>
        </header>

        <div id="post-article-content" class="post-article-content"></div>
      </article>

    </div>
  </main>

  <!-- ===== FOOTER ===== -->
  <footer class="footer">
    <div class="container footer-inner">
      <p>&copy; <span id="footer-year"></span> Ajamali Saiyad. All rights reserved.</p>
      <ul class="footer-links">
        <li><a href="blog.html">Blog</a></li>
        <li><a href="certificates.html">Certificates</a></li>
      </ul>
    </div>
  </footer>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/app.js"></script>
  <script>document.getElementById('footer-year').textContent = new Date().getFullYear();</script>
</body>
</html>
