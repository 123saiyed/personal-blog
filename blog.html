<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Blog posts and updates by Ajamali Saiyad, Assistant Professor at LJ University." />
  <title>Blog — Ajamali Saiyad</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- ===== NAVBAR ===== -->
  <nav class="navbar">
    <div class="container nav-inner">
      <a href="index.html" class="nav-logo">Ajamali Saiyad</a>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="blog.html" class="active">Blog</a></li>
        <li><a href="certificates.html">Certificates</a></li>
      </ul>
      <button class="nav-toggle" aria-label="Toggle menu">&#9776;</button>
    </div>
  </nav>

  <!-- ===== PAGE HEADER ===== -->
  <section class="page-header">
    <div class="container">
      <h1>Blog</h1>
      <p>Thoughts, research, and daily updates from my journey as an Assistant Professor at LJ University.</p>
    </div>
  </section>

  <!-- ===== SEARCH & FILTER ===== -->
  <section class="section">
    <div class="container">
      <div class="blog-controls">
        <div class="search-wrap">
          <input
            type="search"
            id="blog-search"
            placeholder="Search posts..."
            class="search-input"
            aria-label="Search blog posts"
          />
          <span class="search-icon">&#128269;</span>
        </div>
        <div class="filter-wrap">
          <button class="filter-btn active" data-category="all">All</button>
          <button class="filter-btn" data-category="update">Updates</button>
          <button class="filter-btn" data-category="learning">Learnings</button>
          <button class="filter-btn" data-category="project">Projects</button>
          <button class="filter-btn" data-category="career">Career</button>
        </div>
      </div>

      <div class="posts-grid" id="blog-posts">
        <div class="post-card skeleton"></div>
        <div class="post-card skeleton"></div>
        <div class="post-card skeleton"></div>
        <div class="post-card skeleton"></div>
        <div class="post-card skeleton"></div>
        <div class="post-card skeleton"></div>
      </div>

      <div class="empty-state hidden" id="blog-empty">
        <div class="empty-icon">&#128196;</div>
        <p>No posts found. Try a different search.</p>
      </div>

      <div class="load-more-wrap">
        <button class="btn-secondary" id="load-more-btn">Load More Posts</button>
      </div>
    </div>
  </section>

  <!-- ===== FOOTER ===== -->
  <footer class="footer">
    <div class="container footer-inner">
      <p>&copy; <span id="footer-year"></span> Ajamali Saiyad. All rights reserved.</p>
      <ul class="footer-links">
        <li><a href="blog.html">Blog</a></li>
        <li><a href="certificates.html">Certificates</a></li>
        <li><a href="admin/dashboard.html">Admin</a></li>
      </ul>
    </div>
  </footer>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/app.js"></script>
  <script>document.getElementById('footer-year').textContent = new Date().getFullYear();</script>
</body>
</html>
